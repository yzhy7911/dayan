<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>嗒言 - 懂你的智能聊天助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: #ffffff;
    }

    #app {
      width: 100%;
      height: 100%;
    }

    /* 加载指示器 */
    .loading-spinner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 9999;
    }

    .loading-spinner .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #f3f4f6;
      border-top-color: #10b981;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }

    .loading-spinner .text {
      color: #6b7280;
      font-size: 14px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- 加载指示器（Vue 加载前显示） -->
  <div id="loading-spinner" class="loading-spinner">
    <div class="spinner"></div>
    <div class="text">嗒言启动中...</div>
  </div>

  <div id="app"></div>

  <script>
    console.log('[HTML] 页面已加载')
  </script>

  <script type="module" src="/src/renderer/main.ts"></script>
</body>
</html>
