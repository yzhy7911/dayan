name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm vite build

      - name: Build ${{ matrix.platform }}
        run: pnpm electron-builder --${{ matrix.platform }}

      - name: Upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
