<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景光晕效果 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="svipGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>

    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="30" flood-color="#059669" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 最外层光晕 -->
  <circle cx="512" cy="450" r="360" fill="url(#bgGradient)" opacity="0.08"/>
  <circle cx="512" cy="450" r="300" fill="url(#bgGradient)" opacity="0.12"/>

  <!-- 主圆形背景 -->
  <circle cx="512" cy="480" r="280" fill="url(#bgGradient)" filter="url(#softShadow)"/>

  <!-- 顶部高光 -->
  <ellipse cx="512" cy="360" rx="180" ry="100" fill="white" opacity="0.15"/>

  <!-- 对话气泡主体 -->
  <g transform="translate(290, 360)">
    <!-- 气泡白色主体 -->
    <rect x="0" y="0" width="444" height="330" rx="80" fill="white"/>

    <!-- 气泡小尾巴 -->
    <polygon points="150,330 230,330 190,390" fill="white"/>
  </g>

  <!-- AI智能火花点 -->
  <g transform="translate(512, 510)">
    <!-- 左火花 -->
    <circle cx="-70" cy="0" r="24" fill="url(#bgGradient)"/>
    <circle cx="-70" cy="-10" r="10" fill="#34d399" opacity="0.9"/>

    <!-- 中火花 -->
    <circle cx="0" cy="20" r="16" fill="url(#bgGradient)"/>
    <circle cx="0" cy="12" r="7" fill="#34d399" opacity="0.9"/>

    <!-- 右火花 -->
    <circle cx="70" cy="0" r="24" fill="url(#bgGradient)"/>
    <circle cx="70" cy="-10" r="10" fill="#34d399" opacity="0.9"/>
  </g>

  <!-- 顶部高光条 -->
  <ellipse cx="512" cy="380" rx="100" ry="40" fill="white" opacity="0.4"/>

  <!-- 品牌名称 - 搭言 -->
  <text x="512" y="900"
        font-family="SF Pro Display, PingFang SC, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="96"
        font-weight="800"
        fill="#1f2937"
        text-anchor="middle">
    搭言
  </text>

  <!-- Slogan -->
  <text x="512" y="960"
        font-family="SF Pro Display, PingFang SC, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="36"
        fill="#6b7280"
        text-anchor="middle">
    懂你的智能聊天助手
  </text>
</svg>

